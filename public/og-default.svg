<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="50%" style="stop-color:#1e4976"/>
      <stop offset="100%" style="stop-color:#162a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Círculos decorativos -->
  <circle cx="150" cy="120" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1050" cy="500" r="250" fill="rgba(255,255,255,0.02)"/>

  <!-- Línea decorativa izquierda -->
  <line x1="60" y1="200" x2="60" y2="430" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <!-- Logo texto principal -->
  <text x="90" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="82" font-weight="800" fill="#ffffff" letter-spacing="2">
    Starfigs
  </text>

  <!-- Subtítulo -->
  <text x="90" y="345" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" fill="url(#accent)" font-weight="600" letter-spacing="1">
    Figuras de Anime Originales
  </text>

  <!-- Línea separadora -->
  <line x1="90" y1="370" x2="350" y2="370" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Tags -->
  <text x="90" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)" letter-spacing="0.5">
    Nendoroid · Figma · S.H.Figuarts · Ichiban Kuji · Escalas
  </text>

  <!-- Envío gratis -->
  <rect x="90" y="445" width="200" height="36" rx="18" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="190" y="469" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#f59e0b" text-anchor="middle" font-weight="600">
    🚛 Envío gratis a todo Perú
  </text>

  <!-- URL -->
  <text x="90" y="540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="rgba(255,255,255,0.4)" letter-spacing="1">
    starfigsperu.com
  </text>

  <!-- Círculos decorativos pequeños -->
  <circle cx="1100" cy="100" r="8" fill="rgba(245,158,11,0.3)"/>
  <circle cx="1140" cy="130" r="5" fill="rgba(245,158,11,0.2)"/>
  <circle cx="50" cy="550" r="6" fill="rgba(245,158,11,0.25)"/>
</svg>
