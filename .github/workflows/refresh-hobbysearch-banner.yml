name: Refresh HobbySearch banner

on:
  schedule:
    # Monday at 04:20 in Peru.
    - cron: "20 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-hobbysearch-banner
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Refresh matching banners
        env:
          HOBBYSEARCH_BROWSER_HEADLESS: "false"
        run: xvfb-run -a npm run update:hobbysearch-banner

      - name: Commit changes
        run: |
          git add public/banners/hobbysearch src/lib/hobbysearch/generated-banner.json
          if git diff --cached --quiet; then
            echo "Banner is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh HobbySearch banner"
          git push
