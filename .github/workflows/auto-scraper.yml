name: 🤖 Scraper Automático (Descripciones + GTIN)

on:
  schedule:
    # Corre cada 12 horas (3am y 3pm UTC = 10pm/10am Perú)
    - cron: "0 3 */1 * *"
    - cron: "0 15 */1 * *"
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

jobs:
  scrape:
    name: Scrapear tsoto.net y actualizar Firebase
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependencias
        run: |
          pip install requests beautifulsoup4 firebase-admin python-dateutil deep-translator lxml

      - name: 🔑 Setup Firebase credentials
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p secrets
          printf '%s' "$SA_JSON" > secrets/serviceAccountKey.json
          BYTES=$(wc -c < secrets/serviceAccountKey.json)
          if [ "$BYTES" -lt 10 ]; then
            echo "[ERR] FIREBASE_SERVICE_ACCOUNT_JSON: solo $BYTES bytes - secreto vacio o invalido"
            exit 1
          fi
          echo "[OK] serviceAccountKey.json creado ($BYTES bytes)"

      - name: 🏃 Ejecutar scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ./secrets/serviceAccountKey.json
        run: |
          python auto_scraper.py

      - name: 🧹 Limpiar
        if: always()
        run: rm -f secrets/serviceAccountKey.json
