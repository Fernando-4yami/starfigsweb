name: 🔄 Reset Ranking Automático

on:
  schedule:
    # Cada 14 días a las 00:00 UTC (7pm hora Perú)
    - cron: "0 0 */14 * *"
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

jobs:
  reset-ranking:
    name: Resetear ranking cada 2 semanas
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Llamar al endpoint de reset
        run: |
          curl -s -X GET "${{ secrets.RESET_RANKING_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
      - name: ✅ Verificar resultado
        run: echo "Reset del ranking ejecutado correctamente"
